openapi: 3.1.0
info:
  title: petsFollow API
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check
  /api/v1/auth/login:
    post:
      summary: Login vet or client
  /api/v1/pets:
    get:
      summary: List my pets (client)
    post:
      summary: Create pet (client)
  /api/v1/clients:
    get:
      summary: List clients (vet)
  /api/v1/pets/{id}/heartrate/sessions:
    post:
      summary: Start heart rate session
  /api/v1/heartrate/sessions/{id}/validate:
    post:
      summary: Validate and send to vet
