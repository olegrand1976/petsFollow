name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: cd go && go test ./...

  nuxt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuxtjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm test

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuxtjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx playwright test --list
