name: Deploy GCP staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: premedica-prod-2025
  PETSFOLLOW_PUBLIC_SITE_URL: https://petsfollow.ll-it-sc.be
  PETSFOLLOW_API_PUBLIC_URL: https://api.petsfollow.ll-it-sc.be

jobs:
  quality:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud builds submit --config=infra/gcp/cloudbuild.yaml .
      - run: bash infra/gcp/postdeploy.sh

  playwright:
    needs: deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuxtjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx playwright install chromium
      - run: PLAYWRIGHT_BASE_URL=https://petsfollow.ll-it-sc.be npm run test:e2e
